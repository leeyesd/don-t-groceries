<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Eisenhower Matrix - Final Precise Reconstruction</title>
  <style>
    /* Reset and Base Styles */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #FFFFFF;
      font-family: Arial, Helvetica, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow-x: hidden;
    }

    .artboard {
      position: relative;
      width: 1440px;
      height: 1024px;
      background-color: #FFFFFF;
      flex-shrink: 0;
    }

    .grid-container {
      position: absolute;
      left: 97px;
      top: 69px;
      width: 1246px;
      height: 885px;
      display: grid;
      grid-template-columns: 623px 623px;
      grid-template-rows: 442.5px 442.5px;
      gap: 0;
    }

    .quadrant {
      position: relative;
      width: 100%;
      height: 100%;
      cursor: pointer;
      overflow: hidden;
    }

    .q-top-left { background-color: #F44835; }
    .q-top-right { background-color: #E1C0FC; }
    .q-bottom-left { background-color: #58E9B8; }
    .q-bottom-right { background-color: #E2E2E0; }

    .big-text {
      position: absolute;
      color: #000000;
      font-size: 110px;
      font-weight: 400;
      letter-spacing: -2px;
      line-height: 1;
      text-transform: uppercase;
      z-index: 1;
      pointer-events: none;
    }

    .text-now-focus { left: 45px; top: 45px; }
    .text-focus-top { left: 45px; top: 45px; }
    .text-now-bottom { left: 45px; bottom: 45px; }
    .text-focus-cancelled {
      left: 45px;
      bottom: 45px;
      color: #A19D99;
      text-decoration: line-through;
      text-decoration-thickness: 10px;
    }

    .small-white-text {
      position: absolute;
      color: #FFFFFF;
      font-size: 24px;
      font-weight: 400;
      text-transform: uppercase;
      letter-spacing: 1px;
      pointer-events: none;
      z-index: 2;
    }

    .as-soon-as { left: 45px; bottom: 25px; }

    .to-do-first {
      position: absolute;
      color: #FFFFFF;
      font-size: 24px;
      text-transform: uppercase;
      transform: rotate(-90deg);
      transform-origin: left bottom;
      left: 720px; /* Adjusted to sit on the boundary */
      top: 69px;
      white-space: nowrap;
      pointer-events: none;
      z-index: 3;
    }

    .task-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      padding: 160px 45px 45px 45px;
      display: flex;
      flex-wrap: wrap;
      align-content: flex-start;
      gap: 15px;
      pointer-events: none;
      z-index: 5;
    }

    .q-bottom-left .task-container, 
    .q-bottom-right .task-container {
      padding: 45px 45px 160px 45px;
    }

    .task-card {
      width: calc(50% - 8px);
      min-height: 70px;
      background: rgba(255, 255, 255, 0.95);
      padding: 12px;
      font-size: 15px;
      color: #333;
      border: 1px solid rgba(0,0,0,0.05);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      pointer-events: auto;
      box-shadow: 0 2px 5px rgba(0,0,0,0.05);
    }

    .task-card .date-label {
      font-size: 11px;
      color: #888;
      margin-top: 5px;
    }

    /* Modal Styles */
    #modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.4);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 100;
    }

    .modal-content {
      background: #FFFFFF;
      width: 700px;
      min-height: 160px;
      padding: 24px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }

    #task-input {
      width: 100%;
      min-height: 80px;
      border: none;
      outline: none;
      font-size: 22px;
      resize: none;
      font-family: inherit;
    }

    .modal-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-top: 1px solid #EEE;
      padding-top: 16px;
    }

    .options-group {
      display: flex;
      gap: 12px;
      align-items: center;
    }

    .icon-btn {
      background: none;
      border: none;
      cursor: pointer;
      padding: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0.6;
      transition: opacity 0.2s;
    }

    .icon-btn:hover { opacity: 1; }
    .icon-btn:disabled { cursor: not-allowed; opacity: 0.3; }

    #date-toggle {
      background: #F0F0F0;
      padding: 6px 12px;
      border-radius: 15px;
      font-size: 14px;
      color: #333;
      display: none;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    #date-toggle .clear-date { font-weight: bold; color: #999; }

    #send-btn {
      background: #000;
      color: #FFF;
      border: none;
      padding: 12px 30px;
      font-weight: bold;
      cursor: pointer;
      font-size: 18px;
    }

    #send-btn:disabled { background: #CCC; cursor: not-allowed; }
    #send-btn.sending { opacity: 0.7; pointer-events: none; }

    /* Date Picker Dropdown */
    #date-dropdown {
      position: absolute;
      bottom: 85px;
      left: 24px;
      background: white;
      box-shadow: 0 10px 40px rgba(0,0,0,0.2);
      border-radius: 12px;
      width: 280px;
      display: none;
      flex-direction: column;
      overflow: hidden;
      z-index: 110;
    }

    .date-presets { display: flex; flex-direction: column; border-bottom: 1px solid #EEE; }
    .preset-btn { background: none; border: none; padding: 14px 20px; text-align: left; font-size: 16px; cursor: pointer; display: flex; justify-content: space-between; }
    .preset-btn:hover { background: #F9F9F9; }
    .preset-btn span:last-child { color: #888; font-size: 14px; }
    .calendar-picker { padding: 15px; }
    .calendar-picker input { width: 100%; border: 1px solid #DDD; padding: 10px; border-radius: 8px; outline: none; }

  </style>
</head>
<body>
  <div class="artboard">
    <!-- Restored Visual Elements -->
    <div class="to-do-first">To do first ></div>

    <div class="grid-container">
      <!-- Q1 -->
      <div class="quadrant q-top-left" onclick="openModal('q1')">
        <div class="big-text text-now-focus">NOW<br>FOCUS</div>
        <div class="task-container" id="tasks-q1"></div>
        <div class="small-white-text as-soon-as">&lt; AS SOON AS POSSIBLE</div>
      </div>

      <!-- Q2 -->
      <div class="quadrant q-top-right" onclick="openModal('q2')">
        <div class="big-text text-focus-top">FOCUS</div>
        <div class="task-container" id="tasks-q2"></div>
      </div>

      <!-- Q3 -->
      <div class="quadrant q-bottom-left" onclick="openModal('q3')">
        <div class="big-text text-now-bottom">NOW</div>
        <div class="task-container" id="tasks-q3"></div>
      </div>

      <!-- Q4 -->
      <div class="quadrant q-bottom-right" onclick="openModal('q4')">
        <div class="big-text text-focus-cancelled">FOCUS</div>
        <div class="task-container" id="tasks-q4"></div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div id="modal-overlay" onclick="closeModal()">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="input-wrapper">
        <textarea id="task-input" placeholder="할 일을 입력해주세요..." oninput="validate()" onkeydown="handleKeyDown(event)"></textarea>
      </div>

      <div id="date-toggle" onclick="toggleDateDropdown(event)">
        <span id="date-text"></span>
        <span class="clear-date" onclick="clearDate(event)">×</span>
      </div>

      <div id="date-dropdown" onclick="event.stopPropagation()">
        <div class="date-presets">
          <button class="preset-btn" onclick="setDate('today')"><span>오늘</span><span>오늘</span></button>
          <button class="preset-btn" onclick="setDate('tomorrow')"><span>내일</span><span>내일</span></button>
          <button class="preset-btn" onclick="setDate('weekend')"><span>이번 주말</span><span>토</span></button>
        </div>
        <div class="calendar-picker">
          <input type="date" id="calendar-input" onchange="setDate('custom')">
        </div>
      </div>

      <div class="modal-footer">
        <div class="options-group">
          <button class="icon-btn" disabled title="음성 입력 (준비 중)">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
          </button>
          <button class="icon-btn" id="clock-btn" onclick="toggleDateDropdown(event)" title="시간 설정">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          </button>
        </div>
        <button id="send-btn" disabled onclick="sendTask()">GO</button>
      </div>
    </div>
  </div>

  <script>
    let currentQuadrant = null;
    let selectedDate = null;

    function openModal(quadrantId) {
      currentQuadrant = quadrantId;
      document.getElementById('modal-overlay').style.display = 'flex';
      const input = document.getElementById('task-input');
      input.value = '';
      input.focus();
      clearDate();
      validate();
    }

    function closeModal() {
      document.getElementById('modal-overlay').style.display = 'none';
      hideDateDropdown();
    }

    function validate() {
      const text = document.getElementById('task-input').value.trim();
      document.getElementById('send-btn').disabled = (text === "");
    }

    function handleKeyDown(e) {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendTask();
      }
    }

    function toggleDateDropdown(e) {
      if (e) e.stopPropagation();
      const dropdown = document.getElementById('date-dropdown');
      const isVisible = dropdown.style.display === 'flex';
      if (isVisible) {
        hideDateDropdown();
      } else {
        dropdown.style.display = 'flex';
        // Add one-time listener to document for clicking outside
        document.addEventListener('click', handleOutsideClick);
      }
    }

    function hideDateDropdown() {
      document.getElementById('date-dropdown').style.display = 'none';
      document.removeEventListener('click', handleOutsideClick);
    }

    function handleOutsideClick(e) {
      const dropdown = document.getElementById('date-dropdown');
      const clockBtn = document.getElementById('clock-btn');
      const dateToggle = document.getElementById('date-toggle');
      
      if (!dropdown.contains(e.target) && !clockBtn.contains(e.target) && !dateToggle.contains(e.target)) {
        hideDateDropdown();
      }
    }

    function setDate(type) {
      const today = new Date();
      let d = new Date();
      if (type === 'tomorrow') d.setDate(today.getDate() + 1);
      else if (type === 'weekend') {
        const diff = (6 - today.getDay() + 7) % 7 || 7;
        d.setDate(today.getDate() + diff);
      } else if (type === 'custom') {
        d = new Date(document.getElementById('calendar-input').value);
      }
      const year = String(d.getFullYear()).slice(-2);
      const month = String(d.getMonth() + 1).padStart(2, '0');
      const date = String(d.getDate()).padStart(2, '0');
      selectedDate = `${year}.${month}.${date}`;
      document.getElementById('date-text').textContent = selectedDate;
      document.getElementById('date-toggle').style.display = 'flex';
      hideDateDropdown();
    }

    function clearDate(e) {
      if (e) e.stopPropagation();
      selectedDate = null;
      document.getElementById('date-toggle').style.display = 'none';
      document.getElementById('calendar-input').value = '';
      hideDateDropdown();
    }

    function sendTask() {
      const text = document.getElementById('task-input').value.trim();
      const sendBtn = document.getElementById('send-btn');
      if (!text || sendBtn.disabled) return;
      sendBtn.classList.add('sending');
      sendBtn.textContent = '...';
      sendBtn.disabled = true;
      setTimeout(() => {
        const container = document.getElementById('tasks-' + currentQuadrant);
        const card = document.createElement('div');
        card.className = 'task-card';
        card.innerHTML = `<span>${text}</span>${selectedDate ? `<span class="date-label">${selectedDate}</span>` : ''}`;
        card.onclick = (e) => { e.stopPropagation(); card.remove(); };
        container.appendChild(card);
        sendBtn.classList.remove('sending');
        sendBtn.textContent = 'GO';
        closeModal();
      }, 600);
    }
  </script>
</body>
</html>
